# ===== Strategy mode =====
# "directional" = buy long options on momentum/ORB signals (original).
#                 Structurally negative EV for retail — theta + spread
#                 overcome the directional edge on most attempts.
# "wheel"       = sell 30-delta cash-secured puts on SPY/QQQ at 30-45 DTE.
#                 Positive-theta premium harvesting. Close at 50% max
#                 profit or 21 DTE. Win rate ~70% historically.
strategy_mode: wheel

# Wheel-specific config (used only when strategy_mode=wheel)
wheel:
  universe: [SPY, QQQ]           # trade only these 2 for MVP
  target_dte: 35                 # aim for 30-45 DTE puts
  target_delta: 0.30             # 30-delta = ~3% OTM
  profit_target_pct: 0.50        # close when we've captured 50% of premium
  stop_loss_pct: 1.00            # close if option doubles (lose 1× premium)
  dte_roll_threshold: 21         # force-close at 21 DTE regardless of P&L
  max_open_positions: 2          # cash-secured: 2 × 100 × ~$700 = $140k required
  min_cash_reserve_pct: 0.10     # always keep 10% cash free

# ===== Account =====
account:
  paper_starting_equity: 10000.0  # USD, for paper sim
  max_risk_per_trade_pct: 0.01    # Kelly-lite cap
  # Daily-loss circuit breaker. Set high (0.50 = 50%) to effectively
  # disable — losses are controlled per-trade via tight stops instead.
  # Operator requested: "don't halt anything, close individual losers fast".
  max_daily_loss_pct: 0.50
  # Drawdown guard toggle. When false, portfolio-wide DD scale-down and
  # halt tiers are disabled. Per-trade stops still fire.
  drawdown_guard_enabled: false
  max_open_positions: 10

# ===== Universe (top 10 liquid US names) =====
universe:
  # Top-tier liquidity only. These are the 20 most-options-traded
  # tickers in the US — tight spreads, deep OI on every strike,
  # reliable Alpaca chain data. The previous 60-name universe included
  # low-options-volume names (LUV, AAL, DIS, HOOD, WFC, etc.) whose
  # bid-ask spreads ate 5-10%/trade before any strategy signal could
  # play out. That's not a signal-quality problem — it's a
  # universe-selection problem. Fixed.
  #
  # Broad-market ETFs (the four most-options-traded instruments):
  - SPY
  - QQQ
  - IWM
  - DIA
  # Mega-cap tech — always in the top-10 options volume leaderboard:
  - AAPL
  - NVDA
  - TSLA
  - META
  - AMZN
  - MSFT
  - GOOGL
  - AMD
  # Liquid financials + payments:
  - JPM
  - BAC
  - V
  - MA
  # Liquid sector ETFs (wide spreads on minor sector ETFs removed):
  - XLF
  - XLE
  - XLK
  # Chip + high-vol names with deep options books:
  - AVGO
  - MU


# ===== Session (US Eastern) =====
session:
  market_open:  "09:30"
  market_close: "16:00"
  no_new_entries_after: "15:30"
  eod_force_close: "15:45"

# ===== VIX gates =====
vix:
  halt_above: 40.0
  no_short_premium_above: 30.0
  no_0dte_long_below: 12.0
  # Live VIX probe — reads ^VIX from Alpaca or yfinance.
  prefer: auto                       # auto | alpaca | yfinance | fallback
  cache_seconds: 60
  fallback: 15.0                     # used when both data sources fail

# ===== IV rank gates =====
iv_rank:
  block_sell_below: 0.30
  block_buy_above: 0.70

# ===== Signal =====
signal:
  min_confidence: 0.65
  momentum_bars: 5
  momentum_slope_long: 0.0001   # 0.01%
  momentum_slope_short: -0.0001

# ===== Execution =====
execution:
  # Volume confirmation — per-bar volume / 20-bar avg must exceed this.
  # ETFs get a looser threshold because their per-bar volume naturally
  # hovers near the average (SPY trades ~70M/day steadily, so 1.2× surges
  # are rare but liquidity is still ample). Stocks need the surge for
  # momentum confirmation.
  min_volume_confirmation: 1.2        # legacy single-value (fallback)
  min_volume_confirmation_etf: 0.80   # SPY, QQQ, IWM, XLF, etc.
  min_volume_confirmation_stock: 1.20 # individual stocks
  max_spread_pct_etf: 0.05
  max_spread_pct_stock: 0.10
  min_open_interest: 100
  min_today_option_volume: 100
  max_0dte_per_day: 50
  order_ttl_seconds: 5
  # DTE strategy. Fixed (target_dte) OR diversified (target_dte_pool).
  # If target_dte_pool is a non-empty list, each entry randomly picks
  # a DTE from it — lets us compare which DTE bucket wins over time.
  target_dte: 7
  target_dte_pool: [0, 1, 7, 14, 30]
  # Entry spread aggressiveness. 0.00 = pay bid (won't fill), 1.00 =
  # pay ask, 0.30 = bid + 30% of spread (aggressive buyer, saves ~70%
  # of spread vs crossing ask).
  entry_spread_pct: 0.30
  # Pattern/momentum gates — require underlying to have moved in
  # signal direction before entering. Set *_enabled=false to disable.
  vwap_alignment_enabled: true
  momentum_confirmation_enabled: false
  momentum_confirmation_min_move: 0.002   # 0.2% over last 5 bars

# ===== Position sizing =====
sizing:
  kelly_fraction_cap: 0.25   # quarter-Kelly, capped at 5% of equity
  kelly_hard_cap_pct: 0.05
  max_contracts_0dte: 5
  max_contracts_multiday: 10
  # Regime-aware multipliers applied AFTER Kelly sizing. Values > 1.0 grow,
  # < 1.0 shrink, 0.0 forbids entries in that regime. Clipped to [0, 2].
  # Defaults mirror the ensemble weight intuition: favor TREND / RANGE_HIGHVOL.
  regime_multipliers:
    trend_lowvol: 1.20
    trend_highvol: 0.90
    range_lowvol: 1.00
    range_highvol: 1.10
    opening: 0.80
    closing: 0.30

# ===== Exit engine =====
# Operator-requested: keep per-trade losses minimal + close fast.
# Stops were 0.20 / 0.30; tightened to 0.10 / 0.15. At 10% SL, a $1.00
# option closes at $0.90 (loss = $0.10/share × 100 × qty). Across 10
# simultaneous positions (max_open_positions), worst-case session loss
# is ~$1,000 = 10% of account. That's the implicit portfolio floor now
# that the halt is disabled.
exits:
  profit_target_short_dte_pct: 0.35  # 0DTE/1DTE
  profit_target_multi_dte_pct: 0.50  # 2+ DTE
  stop_loss_short_dte_pct: 0.10      # was 0.20 — tightened per operator
  stop_loss_multi_dte_pct: 0.15      # was 0.30 — tightened per operator
  fast_thread_interval_sec: 5
  main_loop_interval_sec: 180
  hard_profit_cap_pct: 1.50
  max_consecutive_holds: 3
  claude_hold_conf_min: 0.70
  # Force-close same-day-expiry (0DTE) contracts after this many minutes
  # of being held, regardless of P&L. Theta on 0DTE decays sharply so
  # the realistic tradable window is narrow. Set to 0 to disable.
  zero_dte_max_hold_minutes: 30

# ===== MI + Edge Score =====
mi_edge:
  block_below_combined_score: -5

# ===== Catalyst calendar (earnings + FDA) =====
catalysts:
  enabled: true
  lookahead_days: 14                 # how far ahead to fetch per refresh
  static_yaml: config/catalysts.yaml # manual overrides (FDA, one-offs)

# ===== News filter =====
news:
  enabled: true
  lookback_hours: 2                  # how far back AlpacaNewsProvider pulls
  cache_ttl_seconds: 300             # re-pull per symbol every 5 min
  block_score: 0.50                  # block directional trades when |score| >= 0.50
  premium_harvest_block_score: 0.75  # require a bigger shock to block premium-harvest

# ===== Broker =====
broker:
  name: paper             # paper | alpaca
  cost_model: stochastic  # 'stochastic' (recommended) or 'linear' (legacy fixed-bps)
  # Fire-and-forget mirror: every paper order is ALSO submitted to
  # Alpaca paper so trades appear in Alpaca's UI. Our PaperBroker stays
  # source of truth; the two books will drift over time since the
  # simulators differ. Requires ALPACA_API_KEY_ID + ALPACA_API_SECRET_KEY
  # in .env and L1+ options permission on the Alpaca paper account.
  mirror_to_alpaca: true
  slippage_bps: 2         # only used when cost_model=linear
  commission_per_option: 0.0
  commission_per_share: 0.0
  # StochasticCostModel tuning (ignored when cost_model=linear)
  half_spread_mult: 1.0
  size_impact_coef: 0.25
  vix_impact_coef: 0.015
  slip_noise_bps: 0.5
  slip_floor_bps: 0.5
  snapshot_path: logs/broker_state.json
  # Auto-calibration: 'hourly' | 'daily' | 'manual'
  # - hourly: tighter loop, max 10% step per cycle
  # - daily:  safer, max 30% step per cycle
  # - manual: no auto-tuning; run scripts/calibrate_slippage.py manually
  auto_calibrate: daily
  calibration_path: logs/slippage_calibration.jsonl
  calibration_history: logs/calibration_history.jsonl
  calibration_min_samples: 30     # skip auto-tuning below this
  calibration_max_step: 0.30      # never move a constant more than this per cycle
  calibration_max_drift: 2.0      # never drift more than 2x from baseline (all cycles)

# ===== Regime classifier =====
regime:
  classifier: rule        # 'rule' (stable, fast) | 'hmm' (smoother, slower)

# ===== Storage (trade journal) =====
storage:
  backend: cockroach              # sqlite | cockroach
  cockroach_dsn_env: COCKROACH_DSN   # name of env var holding the connection string
  # All tradebot tables live in this schema, isolated from any unrelated
  # tables sharing the same database. A CREATE SCHEMA IF NOT EXISTS runs
  # on every connect; search_path is pinned to `<schema>, public` so
  # writes land here and shared extensions (pgcrypto etc.) still resolve.
  cockroach_schema: tradebot

# ===== ML / LSTM signal =====
ml:
  lstm_enabled: true
  lstm_checkpoint: checkpoints/lstm_best.pt
  lstm_min_confidence: 0.55
  lstm_timeframe_minutes: 5          # MUST match what you trained on
  lstm_log_predictions: true         # log every inference to journal for calibration

# ===== Regime-aware ensemble =====
ensemble:
  enabled: true
  # Raised from 0.70 → 0.85: fewer entries, but each one has much
  # higher cross-signal agreement. Operator feedback: too many weak
  # trades were being opened.
  min_weighted_confidence: 0.85
  dominance_ratio: 1.5               # dominant / opposing score required
  log_decisions: true                # every tick-per-symbol with >=1 signal → journal
  # Regime × signal-source weight overrides. Comment out to use DEFAULT_WEIGHTS
  # in src/signals/ensemble.py. Any regime/source not listed uses 1.0 (neutral).
  weights:
    trend_lowvol: {momentum: 1.30, orb: 0.80, vwap_reversion: 0.60, vrp: 0.70, wheel: 0.70, lstm: 1.20, claude_ai: 1.10}
    trend_highvol: {momentum: 1.10, orb: 0.70, vwap_reversion: 0.50, vrp: 0.80, wheel: 0.60, lstm: 0.90, claude_ai: 0.90}
    range_lowvol: {momentum: 0.60, orb: 1.00, vwap_reversion: 1.30, vrp: 1.00, wheel: 1.00, lstm: 0.80, claude_ai: 0.90}
    range_highvol: {momentum: 0.50, orb: 0.90, vwap_reversion: 1.10, vrp: 1.40, wheel: 1.30, lstm: 0.70, claude_ai: 0.80}
    opening: {momentum: 0.80, orb: 1.50, vwap_reversion: 0.80, vrp: 0.60, wheel: 0.60, lstm: 0.80, claude_ai: 0.90}
    closing: {momentum: 0.30, orb: 0.30, vwap_reversion: 0.30, vrp: 0.20, wheel: 0.20, lstm: 0.30, claude_ai: 0.30}

# ===== Live trading master switch =====
live_trading: false       # Must be true AND broker != paper to route real orders
