# ===== Session (US Eastern) =====
session:
  market_open:  "09:30"
  market_close: "16:00"
  no_new_entries_after: "15:30"
  eod_force_close: "15:45"

# ===== VIX gates =====
vix:
  halt_above: 40.0
  no_short_premium_above: 30.0
  no_0dte_long_below: 12.0
  # Live VIX probe — reads ^VIX from Alpaca or yfinance.
  prefer: auto                       # auto | alpaca | yfinance | fallback
  cache_seconds: 60
  fallback: 15.0                     # used when both data sources fail

# ===== IV rank gates =====
iv_rank:
  block_sell_below: 0.30
  block_buy_above: 0.70

# ===== Signal =====
signal:
  min_confidence: 0.65
  momentum_bars: 5
  momentum_slope_long: 0.0001   # 0.01%
  momentum_slope_short: -0.0001

# ===== Execution =====
execution:
  min_volume_confirmation: 1.2   # current bar >= 1.2x avg
  max_spread_pct_etf: 0.05
  max_spread_pct_stock: 0.10
  min_open_interest: 500
  min_today_option_volume: 100
  max_0dte_per_day: 50
  order_ttl_seconds: 5

# ===== Position sizing =====
sizing:
  kelly_fraction_cap: 0.25   # quarter-Kelly, capped at 5% of equity
  kelly_hard_cap_pct: 0.05
  max_contracts_0dte: 5
  max_contracts_multiday: 10
  # Regime-aware multipliers applied AFTER Kelly sizing. Values > 1.0 grow,
  # < 1.0 shrink, 0.0 forbids entries in that regime. Clipped to [0, 2].
  # Defaults mirror the ensemble weight intuition: favor TREND / RANGE_HIGHVOL.
  regime_multipliers:
    trend_lowvol: 1.20
    trend_highvol: 0.90
    range_lowvol: 1.00
    range_highvol: 1.10
    opening: 0.80
    closing: 0.30

# ===== Exit engine =====
exits:
  profit_target_short_dte_pct: 0.35  # 0DTE/1DTE
  profit_target_multi_dte_pct: 0.50  # 2+ DTE
  stop_loss_short_dte_pct: 0.20
  stop_loss_multi_dte_pct: 0.30
  fast_thread_interval_sec: 5
  main_loop_interval_sec: 180
  hard_profit_cap_pct: 1.50
  max_consecutive_holds: 3
  claude_hold_conf_min: 0.70

# ===== MI + Edge Score =====
mi_edge:
  block_below_combined_score: -5

# ===== Catalyst calendar (earnings + FDA) =====
catalysts:
  enabled: true
  lookahead_days: 14                 # how far ahead to fetch per refresh
  static_yaml: config/catalysts.yaml # manual overrides (FDA, one-offs)

# ===== News filter =====
news:
  enabled: true
  lookback_hours: 2                  # how far back AlpacaNewsProvider pulls
  cache_ttl_seconds: 300             # re-pull per symbol every 5 min
  block_score: 0.50                  # block directional trades when |score| >= 0.50
  premium_harvest_block_score: 0.75  # require a bigger shock to block premium-harvest

# ===== Broker =====
broker:
  name: paper             # paper | alpaca
  slippage_bps: 2         # 2 bps simulated slippage per leg
  commission_per_option: 0.0
  commission_per_share: 0.0

# ===== Storage (trade journal) =====
storage:
  backend: cockroach              # sqlite | cockroach
  cockroach_dsn_env: COCKROACH_DSN   # name of env var holding the connection string

# ===== ML / LSTM signal =====
ml:
  lstm_enabled: true
  lstm_checkpoint: checkpoints/lstm_best.pt
  lstm_min_confidence: 0.55
  lstm_timeframe_minutes: 5          # MUST match what you trained on
  lstm_log_predictions: true         # log every inference to journal for calibration

# ===== Regime-aware ensemble =====
ensemble:
  enabled: true
  min_weighted_confidence: 0.70      # sum of weighted confidences required to emit
  dominance_ratio: 1.5               # dominant / opposing score required
  log_decisions: true                # every tick-per-symbol with >=1 signal → journal
  # Regime × signal-source weight overrides. Comment out to use DEFAULT_WEIGHTS
  # in src/signals/ensemble.py. Any regime/source not listed uses 1.0 (neutral).
  weights:
    trend_lowvol: {momentum: 1.30, orb: 0.80, vwap_reversion: 0.60, vrp: 0.70, wheel: 0.70, lstm: 1.20, claude_ai: 1.10}
    trend_highvol: {momentum: 1.10, orb: 0.70, vwap_reversion: 0.50, vrp: 0.80, wheel: 0.60, lstm: 0.90, claude_ai: 0.90}
    range_lowvol: {momentum: 0.60, orb: 1.00, vwap_reversion: 1.30, vrp: 1.00, wheel: 1.00, lstm: 0.80, claude_ai: 0.90}
    range_highvol: {momentum: 0.50, orb: 0.90, vwap_reversion: 1.10, vrp: 1.40, wheel: 1.30, lstm: 0.70, claude_ai: 0.80}
    opening: {momentum: 0.80, orb: 1.50, vwap_reversion: 0.80, vrp: 0.60, wheel: 0.60, lstm: 0.80, claude_ai: 0.90}
    closing: {momentum: 0.30, orb: 0.30, vwap_reversion: 0.30, vrp: 0.20, wheel: 0.20, lstm: 0.30, claude_ai: 0.30}

# ===== Live trading master switch =====
live_trading: false       # Must be true AND broker != paper to route real orders
