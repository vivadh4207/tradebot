# ===== Strategy mode =====
# "directional" = buy long options on momentum/ORB signals. Per operator:
#                 only buying, never selling — long calls and long puts
#                 only, defined max-loss per trade. Relies on the exit
#                 improvements (tight 10% stops + scale-out + trailing
#                 stop + VWAP/momentum filters + ensemble threshold 0.60)
#                 to make the structural theta headwind survivable.
# "wheel"       = (unused) sell cash-secured puts. Kept in code for
#                 optional future testing.
strategy_mode: directional

# Wheel-specific config (used only when strategy_mode=wheel)
wheel:
  # Operator decision 2026-04-17: universe locked to SPY + QQQ only
  # across ALL strategy modes. Expand only after 100+ round-trips prove
  # measurable edge on these two. SPY/QQQ have 10× the options
  # liquidity of anything else and the cleanest data. Each CSP requires
  # ~$60-70k collateral — wheel is only viable on a funded paper/live
  # account matched to that scale.
  universe: [SPY, QQQ]
  target_dte: 35                 # aim for 30-45 DTE puts
  target_delta: 0.30             # 30-delta = ~3% OTM
  profit_target_pct: 0.50        # close when we've captured 50% of premium
  stop_loss_pct: 1.00            # close if option doubles (lose 1× premium)
  dte_roll_threshold: 21         # force-close at 21 DTE regardless of P&L
  max_open_positions: 2          # cash-secured: 2 × 100 × ~$700 = $140k required
  min_cash_reserve_pct: 0.10     # always keep 10% cash free

# ===== Account =====
account:
  # Match Alpaca paper's default ($100k). Wheel on SPY/QQQ requires
  # ~$70k collateral per CSP — a $10k paper account can't do the
  # strategy. Setting equal to Alpaca paper so local book and Alpaca
  # mirror report consistent cash.
  paper_starting_equity: 100000.0  # USD, for paper sim
  max_risk_per_trade_pct: 0.01    # Kelly-lite cap
  # Daily-loss circuit breaker. Set high (0.50 = 50%) to effectively
  # disable — losses are controlled per-trade via tight stops instead.
  # Operator requested: "don't halt anything, close individual losers fast".
  max_daily_loss_pct: 0.50
  # Drawdown guard toggle. When false, portfolio-wide DD scale-down and
  # halt tiers are disabled. Per-trade stops still fire.
  drawdown_guard_enabled: false
  max_open_positions: 10

# ===== Universe — locked to SPY + QQQ =====
universe:
  # Operator decision 2026-04-17 (confirmed): universe is SPY + QQQ
  # ONLY. No dynamic expansion, no auto-discovery, no alt-symbols.
  # SPY + QQQ have 10× the options liquidity of anything else and the
  # cleanest data. Adding symbols adds parameters without adding
  # information and fractures statistics across a fixed sample budget.
  # Expand back only after 100+ round-trips prove measurable edge.
  - SPY
  - QQQ


# ===== Session (US Eastern) =====
session:
  market_open:  "09:30"
  market_close: "16:00"
  no_new_entries_after: "15:30"
  eod_force_close: "15:45"

# ===== VIX gates =====
vix:
  halt_above: 40.0                    # hard crash halt (panic-mode)
  # Quant-advisor recommendation: stand down in VIX > 25 regimes.
  # In high-vol regimes directional alpha compresses (everything
  # correlates), bid-ask widens, theta compresses IV — long-option
  # strategies underperform markedly. Trade only in calm regimes.
  regime_halt_vix: 25.0
  # Backwardation halt — fires when VIX > VIX3M (spot > 3-month future),
  # a proven crisis precursor. Requires VIX3M feed (we don't have one
  # wired yet); set backwardation_halt_enabled: true + populate
  # vix3m_override manually to test.
  backwardation_halt_enabled: false
  vix3m_override: 0                   # manual override for testing
  no_short_premium_above: 30.0
  no_0dte_long_below: 12.0
  # Live VIX probe — reads ^VIX from Alpaca or yfinance.
  prefer: auto                       # auto | alpaca | yfinance | fallback
  cache_seconds: 60
  fallback: 15.0                     # used when both data sources fail

# ===== IV rank gates =====
iv_rank:
  block_sell_below: 0.30
  block_buy_above: 0.70

# ===== Signal =====
signal:
  min_confidence: 0.65
  momentum_bars: 5
  momentum_slope_long: 0.0001   # 0.01%
  momentum_slope_short: -0.0001

# ===== Execution =====
execution:
  # Volume confirmation — per-bar volume / 20-bar avg must exceed this.
  # ETFs get a looser threshold because their per-bar volume naturally
  # hovers near the average (SPY trades ~70M/day steadily, so 1.2× surges
  # are rare but liquidity is still ample). Stocks need the surge for
  # momentum confirmation.
  min_volume_confirmation: 1.2        # legacy single-value (fallback)
  min_volume_confirmation_etf: 0.40   # SPY, QQQ, IWM, XLF, etc. — loosened
                                        # after operator noted 0.55 still blocked
                                        # trades during active-but-thin sessions
  min_volume_confirmation_stock: 1.20 # individual stocks
  max_spread_pct_etf: 0.05
  max_spread_pct_stock: 0.10
  min_open_interest: 100
  min_today_option_volume: 100
  max_0dte_per_day: 50
  order_ttl_seconds: 5
  # DTE strategy. Fixed (target_dte) OR diversified (target_dte_pool).
  # If target_dte_pool is a non-empty list, each entry randomly picks
  # a DTE from it — lets us compare which DTE bucket wins over time.
  # Quant-advisor recommendation: drop 0DTE/1DTE. Theta at 30-40%/day
  # makes them a losing lottery. 14-45 DTE gives directional thesis
  # time to play out (2-5%/day theta) without capital tied up forever.
  target_dte: 14
  target_dte_pool: [7, 14, 30]
  # Entry spread aggressiveness. 0.00 = pay bid (won't fill), 1.00 =
  # pay ask, 0.30 = bid + 30% of spread (aggressive buyer, saves ~70%
  # of spread vs crossing ask).
  entry_spread_pct: 0.30
  # Pattern/momentum gates — require underlying to have moved in
  # signal direction before entering. Set *_enabled=false to disable.
  vwap_alignment_enabled: true
  momentum_confirmation_enabled: false
  momentum_confirmation_min_move: 0.002   # 0.2% over last 5 bars

  # Scalp-viability filter (f18) — holistic gate. The decision to
  # enter comes from the COMPOSITE of all filters (momentum, volume,
  # spread, OI, IV rank, VWAP, news, ensemble confidence) — NOT from
  # an arbitrary price floor. A $0.40 OTM call can 10-bag on the
  # right setup, so we don't reject purely on absolute price.
  #
  # What f18 DOES enforce:
  #   - |delta| ∈ [scalp_delta_min, scalp_delta_max] — the option
  #     has to be responsive to underlying moves. 0.20 covers
  #     high-gamma OTM plays; 0.70 covers ITM moderately-leveraged
  #     plays. Outside that range the option either barely moves
  #     (pure tails) or is all intrinsic (deep ITM, low gearing).
  #   - today_volume >= min when REPORTED > 0 — stale quotes only.
  # min_option_ask is kept at 0 (disabled) per operator: real filter
  # is the cumulative-signal one, not a dollar-amount gate.
  scalp_viability_enabled: true
  min_option_ask: 0.0                # disabled; composite decides
  scalp_delta_min: 0.20              # was 0.35 — allow cheap OTM
  scalp_delta_max: 0.70              # was 0.65 — allow mild ITM
  scalp_min_contract_volume: 50

  # Contract-count policy.
  #   default_qty = 1 per entry per ticker (operator request: "only buy
  #                1 contract unless momentum + greeks both favor")
  #   scale-up to max_qty_if_strong ONLY when all THREE conditions:
  #     - delta in sweet spot [scalp_delta_scale_min, scalp_delta_scale_max]
  #     - 5-bar underlying move in signal direction >= 0.5%
  #     - current bar volume >= scalp_min_volume_multiple × 20-bar avg
  default_qty_per_entry: 1
  max_qty_if_strong: 3
  # Scale-up to qty>1 requires a COMPOSITE of momentum + volume +
  # delta being simultaneously strong. Delta range widened because
  # high-gamma OTM (delta 0.25–0.35) is exactly where a cheap call
  # can multiply on a real move — we want to size up there too.
  scalp_delta_scale_min: 0.25        # was 0.40 — include high-gamma OTM
  scalp_delta_scale_max: 0.60        # was 0.55
  scalp_scale_min_underlying_move: 0.005
  scalp_scale_min_volume_multiple: 2.0

# ===== Position sizing =====
sizing:
  kelly_fraction_cap: 0.25   # quarter-Kelly, capped at 5% of equity
  kelly_hard_cap_pct: 0.05
  max_contracts_0dte: 5
  max_contracts_multiday: 10
  # Regime-aware multipliers applied AFTER Kelly sizing. Values > 1.0 grow,
  # < 1.0 shrink, 0.0 forbids entries in that regime. Clipped to [0, 2].
  # Defaults mirror the ensemble weight intuition: favor TREND / RANGE_HIGHVOL.
  regime_multipliers:
    trend_lowvol: 1.20
    trend_highvol: 0.90
    range_lowvol: 1.00
    range_highvol: 1.10
    opening: 0.80
    closing: 0.30

# ===== Exit engine =====
# Operator-requested: keep per-trade losses minimal + close fast.
# Stops were 0.20 / 0.30; tightened to 0.10 / 0.15. At 10% SL, a $1.00
# option closes at $0.90 (loss = $0.10/share × 100 × qty). Across 10
# simultaneous positions (max_open_positions), worst-case session loss
# is ~$1,000 = 10% of account. That's the implicit portfolio floor now
# that the halt is disabled.
exits:
  profit_target_short_dte_pct: 0.35  # 0DTE/1DTE
  profit_target_multi_dte_pct: 0.50  # 2+ DTE
  stop_loss_short_dte_pct: 0.10      # was 0.20 — tightened per operator
  stop_loss_multi_dte_pct: 0.15      # was 0.30 — tightened per operator
  fast_thread_interval_sec: 5
  main_loop_interval_sec: 180
  hard_profit_cap_pct: 1.50
  max_consecutive_holds: 3
  claude_hold_conf_min: 0.70
  # Force-close same-day-expiry (0DTE) contracts after this many minutes
  # of being held, regardless of P&L. Theta on 0DTE decays sharply so
  # the realistic tradable window is narrow. Set to 0 to disable.
  zero_dte_max_hold_minutes: 30

# ===== MI + Edge Score =====
mi_edge:
  block_below_combined_score: -5

# ===== Catalyst calendar (earnings + FDA) =====
catalysts:
  enabled: true
  lookahead_days: 14                 # how far ahead to fetch per refresh
  static_yaml: config/catalysts.yaml # manual overrides (FDA, one-offs)

# ===== Notifier noise control =====
# Per-event Discord toggles. Operator preference: only trading events
# (entries, exits, halts, watchdog crashes, errors) should ping Discord.
# Operational chatter (startup, catalyst daily list, zombie reconcile)
# stays in the log file only — visible via `tradebotctl logs` or the
# dashboard, but doesn't spam the channels on every watchdog restart.
notifier:
  startup_notify: false       # "tradebot started — paper, broker=..."
  catalysts_notify: false     # daily "23 upcoming catalysts" summary
  reconcile_notify: false     # "closed N zombie positions on Alpaca"
  # Fill/exit/HALT/watchdog/error notifications remain ON unconditionally
  # — those are real trading/ops events.

# ===== News filter =====
news:
  enabled: true
  lookback_hours: 2                  # how far back AlpacaNewsProvider pulls
  cache_ttl_seconds: 300             # re-pull per symbol every 5 min
  block_score: 0.50                  # block directional trades when |score| >= 0.50
  premium_harvest_block_score: 0.75  # require a bigger shock to block premium-harvest

# ===== Broker =====
broker:
  name: paper             # paper | alpaca
  cost_model: stochastic  # 'stochastic' (recommended) or 'linear' (legacy fixed-bps)
  # Fire-and-forget mirror: every paper order is ALSO submitted to
  # Alpaca paper so trades appear in Alpaca's UI. Our PaperBroker stays
  # source of truth; the two books will drift over time since the
  # simulators differ. Requires ALPACA_API_KEY_ID + ALPACA_API_SECRET_KEY
  # in .env and L1+ options permission on the Alpaca paper account.
  mirror_to_alpaca: true
  slippage_bps: 2         # only used when cost_model=linear
  commission_per_option: 0.0
  commission_per_share: 0.0
  # StochasticCostModel tuning (ignored when cost_model=linear)
  half_spread_mult: 1.0
  size_impact_coef: 0.25
  vix_impact_coef: 0.015
  slip_noise_bps: 0.5
  slip_floor_bps: 0.5
  snapshot_path: logs/broker_state.json
  # Auto-calibration: 'hourly' | 'daily' | 'manual'
  # - hourly: tighter loop, max 10% step per cycle
  # - daily:  safer, max 30% step per cycle
  # - manual: no auto-tuning; run scripts/calibrate_slippage.py manually
  auto_calibrate: daily
  calibration_path: logs/slippage_calibration.jsonl
  calibration_history: logs/calibration_history.jsonl
  calibration_min_samples: 30     # skip auto-tuning below this
  calibration_max_step: 0.30      # never move a constant more than this per cycle
  calibration_max_drift: 2.0      # never drift more than 2x from baseline (all cycles)

# ===== Regime classifier =====
regime:
  classifier: rule        # 'rule' (stable, fast) | 'hmm' (smoother, slower)

# ===== Storage (trade journal) =====
# Local SQLite file. Zero setup, zero cost, no cloud request quotas.
storage:
  sqlite_path: logs/tradebot.sqlite

# ===== ML / LSTM signal =====
ml:
  lstm_enabled: true
  lstm_checkpoint: checkpoints/lstm_best.pt
  lstm_min_confidence: 0.55
  lstm_timeframe_minutes: 5          # MUST match what you trained on
  lstm_log_predictions: true         # log every inference to journal for calibration

# ===== Regime-aware ensemble =====
ensemble:
  enabled: true
  # Lowered from 0.85 → 0.60: 0.85 was so strict nothing triggered.
  # Operator missed a SPY-put entry during a real dip because scores
  # peaked at 0.70. With 0.60, today's 0.70 reads would have cleared.
  min_weighted_confidence: 0.60
  dominance_ratio: 1.5               # dominant / opposing score required
  log_decisions: true                # every tick-per-symbol with >=1 signal → journal
  # Regime × signal-source weight overrides. Comment out to use DEFAULT_WEIGHTS
  # in src/signals/ensemble.py. Any regime/source not listed uses 1.0 (neutral).
  weights:
    # lstm=0: no trained checkpoint on disk, zero-signal poisons the average.
    # candle_patterns: new — chart-reading layer, helps quick entries.
    trend_lowvol: {momentum: 1.30, orb: 0.80, vwap_reversion: 0.60, vrp: 0.70, wheel: 0.70, lstm: 0.00, claude_ai: 1.10, candle_patterns: 1.00}
    trend_highvol: {momentum: 1.10, orb: 0.70, vwap_reversion: 0.50, vrp: 0.80, wheel: 0.60, lstm: 0.00, claude_ai: 0.90, candle_patterns: 1.10}
    range_lowvol: {momentum: 0.60, orb: 1.00, vwap_reversion: 1.30, vrp: 1.00, wheel: 1.00, lstm: 0.00, claude_ai: 0.90, candle_patterns: 1.30}
    range_highvol: {momentum: 0.50, orb: 0.90, vwap_reversion: 1.10, vrp: 1.40, wheel: 1.30, lstm: 0.00, claude_ai: 0.80, candle_patterns: 1.20}
    opening: {momentum: 0.80, orb: 1.50, vwap_reversion: 0.80, vrp: 0.60, wheel: 0.60, lstm: 0.00, claude_ai: 0.90, candle_patterns: 0.90}
    closing: {momentum: 0.30, orb: 0.30, vwap_reversion: 0.30, vrp: 0.20, wheel: 0.20, lstm: 0.00, claude_ai: 0.30, candle_patterns: 0.30}

# ===== Extra signal sources + ORB retest + breadth =====
# All off by default — operator flips each to true when ready to test.
# See the per-module docstrings for the reasoning behind each knob.
signals:
  orb:
    retest_required: false       # wait for breakout + pullback + reclaim
    retest_band_pct: 0.0015       # 0.15% band around OR boundary for retest
  extreme_momentum:
    enabled: true                 # shock-pattern detector, complementary to momentum
    lookback_bars: 5
    baseline_bars: 20
    min_move_pct: 0.03             # 3% move in lookback window
    min_volume_multiple: 3.0       # 3× baseline volume
    confidence: 0.85
  # Chart-reading layer: engulfing, hammer, shooting star, inside-bar
  # breakout, 20-bar range breakout. Volume-gated so low-volume
  # breakouts don't fire as false signals.
  candle_patterns:
    enabled: true
    min_bars: 20
    volume_hi_ratio: 1.5           # bar vol >= 1.5x 20-bar avg = confirmed
    volume_lo_ratio: 0.6           # bar vol <= 0.6x 20-bar avg = weak
    low_vol_damp: 0.20             # subtract from confidence on low vol
    high_vol_boost: 0.10           # add to confidence on high vol
    near_vwap_bps: 50.0            # within 0.50% of VWAP = "near"
    near_vwap_boost: 0.05
    continuation_require_volume: true   # drop low-vol breakouts
  # Technical analysis layer: RSI divergence, double top/bottom, 50-SMA
  # (median-line) break with volume, Bollinger-band reclaim, and
  # multi-timeframe RSI confluence (5-min + 15-min agreement).
  technical_analysis:
    enabled: true
    min_bars: 60
    rsi_period: 14
    bb_period: 20
    bb_std: 2.0
    sma_period: 50                 # median line
    short_tf_group: 5              # ~5-min equivalent on 1-min bars
    long_tf_group: 15             # ~15-min equivalent
    low_vol_damp: 0.15
  # LLM-originated trades (Level 1 autotrade). When enabled + the
  # LLM_AUTOTRADE env is set to 1, the research agent writes ideas to
  # logs/llm_autotrade_queue.jsonl and this signal source emits them
  # back into the ensemble as first-class signals. They still clear
  # the full 19-filter chain, the order validator, the sizer, and the
  # mirror broker. Kill switch via Discord `!llm-autotrade off`.
  llm_origination:
    enabled: true
    max_age_min: 30                # drop ideas older than this
    max_trades_per_day: 3
    min_confidence: medium         # "medium" or "high" — "low" never fires
  # Long-put-dip — explicit "profit from the fall" trigger. Fires when
  # price drops >0.4% below VWAP with RSI(5) oversold AND a macro
  # confirmation (VIX spike OR breadth deterioration). If no macro
  # data is available, falls back to requiring a deeper price-only
  # trigger (>= 2x the dip threshold + RSI below ceiling-5).
  long_put_dip:
    enabled: true
    vwap_dip_pct: 0.004           # 0.4% below VWAP
    rsi_ceiling: 35.0              # 5-bar RSI below this
    rsi_period: 5
    vix_spike_pct: 0.05            # VIX up 5%+ on day
    breadth_decliners_mult: 2.0    # decliners > 2x advancers
    min_vol_ratio: 1.1             # current bar >= avg volume
    min_bars: 40

# ===== Price-action liveness gate =====
# Blocks entries when the underlying isn't moving. Options decay
# faster than a flat tape can reward — a long call on a frozen SPY
# bleeds theta while the stock does nothing. Filter f19 checks:
#   - ATR(20) / spot < atr_floor_pct  → stagnant, block
#   - (hi20 - lo20) / mid < range_floor_pct → tight range, block
price_action:
  enabled: true
  window: 20                          # bars to measure
  atr_floor_pct: 0.0010              # 0.10% ATR/spot floor for SPY/QQQ
  range_floor_pct: 0.0025            # 0.25% range/mid floor

breadth:
  enabled: true                    # composite risk-on/off probe

# ===== Multi-source market data =====
# Which providers to fan out to alongside Alpaca. Each is activated by
# its .env key; listing here is purely informational + tuning.
data_providers:
  quote_disagreement_pct: 0.005   # >0.5% between sources triggers median fallback
  fan_out_timeout_sec: 8.0
  providers:
    alpaca:   {enabled: true,  kind: primary}
    polygon:  {enabled: true,  kind: options, note: "Needs POLYGON_API_KEY"}
    tradier:  {enabled: true,  kind: options, note: "Needs TRADIER_TOKEN"}
    finnhub:  {enabled: true,  kind: news_and_sentiment, note: "FINNHUB_KEY set"}

# ===== Options research agent =====
# Runs every 30 min during session AND on-demand via Discord
# `!research [SYMBOL]`. Uses data_providers + the 70B auditor model.
options_research:
  enabled: true
  underlyings: [SPY, QQQ]
  strikes_each_side: 4
  max_tokens: 700
  timeout_sec: 240.0              # 70B can take 60-180s
  auto_post_interval_min: 30      # in launchd plist; this is informational
  cache_seconds: 60
  risk_off_threshold: -0.3         # credit-spread runners stand down below this

# ===== Credit-spread strategies =====
# Additive to the directional / wheel paths. Each runner has its own
# time-of-day gates, its own position budget, and its own exit engine.
# Strategies recommended by the advanced quant review as the highest-
# Sharpe additions for a $100K retail account on SPY/QQQ.
credit_spreads:
  enabled: false                 # set to true to activate — off by default
                                 # so first live deploy is opt-in
  weekly_enabled: true           # 30-45 DTE put credit spreads, 0.20 delta
  zero_dte_enabled: false        # 0DTE support + RSI spreads (enable after
                                 # weekly has 30+ days of paper track record)
  universe: [SPY, QQQ]
  weekly:
    dte_min: 30
    dte_max: 45
    short_delta: 0.20
    long_delta: 0.08
    max_wing_width: 10.0         # dollars — reject if chain too thin
    min_credit_pct_of_wing: 0.15 # $0.75 credit on a $5 wing = 15%
    max_open_positions: 2        # 1 per symbol
    profit_target_pct: 0.50      # close at 50% of max profit
    dte_close_threshold: 21      # force-close at 21 DTE (gamma wall)
  zero_dte:
    short_delta: 0.12
    wing_width: 5.0
    max_open_positions: 3
    rsi_oversold: 35.0
    support_band_pct: 0.005      # spot within 0.5% of recent low
    support_lookback_bars: 20
    profit_target_pct: 0.50
    stop_loss_pct: 1.50          # stop when unrealized = -1.5× credit
  exits:
    # Shared by both runners. zero_dte honors force_close_et at 15:45.
    profit_target_pct: 0.50
    stop_loss_pct: 1.50
    dte_close_threshold: 21

# ===== Macro put/call OI risk switch =====
# Daily script (scripts/fetch_putcall_oi.py) pulls CBOE EOD ETF put/call
# OI. When ratio exceeds threshold AND 5d avg is rising, writes a
# risk-off state that multiplies position sizing by `size_multiplier`
# for `duration_days`. Shrinks exposure during broad hedging regimes.
# The position sizer reads logs/putcall_state.json on every entry.
putcall_oi:
  risk_off_ratio_threshold: 2.0
  lookback_days: 5
  risk_off_duration_days: 3
  risk_off_size_multiplier: 0.70

# ===== Local LLM layer (Jetson) =====
# Two LLMs, each with a specific role:
#
#   llm_brain        — 8B model, runs on every entry as a review/synthesis
#                       layer AFTER the rule-based signals decide. Soft mode
#                       (default): can scale confidence up/down within
#                       [min_clamp, max_clamp]. Hard mode: can veto.
#                       Latency-sensitive, rate-limited, cached.
#
#   strategy_auditor — 70B model, runs nightly (cron) + on demand (dashboard
#                       button). Reviews the WHOLE setup — settings, recent
#                       trade journal, market state — and returns an
#                       overall-health score + prioritized issues list.
#                       Never in the hot path; too slow (~3-6 tok/sec).
#
# Both models live on the SD card under $TRADEBOT_DATA_ROOT/models/.
# Both are OFF by default — flip `enabled: true` after
# scripts/jetson_bootstrap.sh has downloaded the GGUF files.
llm_brain:
  enabled: false
  backend: llama_cpp              # llama_cpp (GGUF) | ollama (HTTP)
  model_name: llama-3.1-8b-q4     # ollama tag when backend=ollama
  # model_path auto-resolves to data_root/models/llama-3.1-8b-q4.gguf if empty
  model_path: ""
  hard_gate: false                  # true → LLM can veto. Audit soft-mode first.
  rate_limit_sec_per_symbol: 30.0
  cache_ttl_sec: 20.0
  max_tokens: 180
  temperature: 0.1
  min_clamp: 0.30                   # confidence_multiplier floor
  max_clamp: 1.30                   # confidence_multiplier ceiling
  timeout_sec: 3.0
  n_ctx: 2048
  n_gpu_layers: -1                  # all layers on GPU (Jetson CUDA)

strategy_auditor:
  backend: llama_cpp              # llama_cpp (GGUF) | ollama (HTTP)
  # model_path auto-resolves to data_root/models/llama-3.1-70b-q4.gguf if empty
  model_path: ""
  model_name: llama-3.1-70b-q4    # ollama tag when backend=ollama
  n_ctx: 4096
  n_gpu_layers: -1
  max_tokens: 900
  temperature: 0.15
  log_path: logs/strategy_audit.jsonl
  trade_lookback_days: 14

# ===== Political news feed (inputs to the 70B auditor) =====
# Aggregates headlines from Alpaca News (filtered by political keyword
# density) + optional X/Twitter via Nitter RSS + optional arbitrary
# RSS feeds (Truth Social archives, Fed/WH press, etc). All sources
# are fail-graceful — one being down doesn't disable the others.
# Feeds into StrategyAuditor so the 70B sees political risk alongside
# config and trade history.
political_news:
  enabled: true
  alpaca_enabled: true                # reuse existing Alpaca News auth
  x_enabled: true                     # Twitter via Nitter
  rss_enabled: true                   # CNBC, Reuters, Bloomberg, Reddit, Truth, Fed, WH
  nitter_instance: https://nitter.privacydev.net
  x_handles:
    - WhiteHouse
    - FederalReserve
    - POTUS
    - USTradeRep
    - SecYellen
    - SpeakerJohnson
    - SenSchumer
    - realDonaldTrump
    - elonmusk
    - jimcramer
    - zerohedge
    - unusual_whales
  # Broad source mix: mainstream financial press, government primary
  # sources, political/social sentiment. Add/remove freely.
  rss_feeds:
    # Financial mainstream
    - https://feeds.content.dowjones.io/public/rss/mw_topstories
    - https://www.cnbc.com/id/100003114/device/rss/rss.html      # CNBC Top News
    - https://www.cnbc.com/id/10001147/device/rss/rss.html       # CNBC Markets
    - https://feeds.reuters.com/reuters/businessNews
    - https://feeds.reuters.com/reuters/topNews
    - https://feeds.bloomberg.com/markets/news.rss
    # Reddit pulse (heavier noise, but useful retail sentiment)
    - https://www.reddit.com/r/wallstreetbets/.rss
    - https://www.reddit.com/r/stocks/hot/.rss
    - https://www.reddit.com/r/options/.rss
    # Macro primary sources
    - https://www.federalreserve.gov/feeds/speeches.xml
    - https://www.federalreserve.gov/feeds/press_all.xml
    - https://www.whitehouse.gov/feed/
    - https://home.treasury.gov/rss/press-releases
    # Truth Social — public user RSS via community archives. If the
    # archive changes URL, comment out this line until the new one is
    # curated. Fails gracefully if 404.
    - https://trumpstruth.org/feed
  lookback_hours: 24
  max_headlines: 60                    # more sources -> more headlines
  cache_seconds: 900                  # 15 min
  http_timeout_sec: 8.0

# ===== Live trading master switch =====
live_trading: false       # Must be true AND broker != paper to route real orders
