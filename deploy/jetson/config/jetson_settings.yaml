# Jetson-tuned overrides for config/settings.yaml.
#
# Copy specific blocks you want to use on top of the base settings.yaml.
# The bot reads ONE settings file per process, so either:
#   (a) replace config/settings.yaml entirely, or
#   (b) keep both and point TRADEBOT_SETTINGS_PATH at this one.

# Main loop runs a little faster on a Jetson without hurting anything.
exits:
  main_loop_interval_sec: 120           # was 180
  fast_thread_interval_sec: 3           # was 5 — Orin CPU can handle it

# Tighter max positions while the Jetson is trading paper —
# you have plenty of RAM, but fewer concurrent positions = cleaner stats.
account:
  max_open_positions: 5

# Lookahead further when running a device we expect to leave on 24/7.
catalysts:
  lookahead_days: 30

# News cache can be tighter on a local-LLM Jetson — inference is fast + free.
news:
  cache_ttl_seconds: 120                # was 300
